name: Deploy a ayspmgp.com.ar

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via SSH al servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            /var/www/ayspmgp/deploy.sh

      - name: Notificar resultado
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy exitoso a ayspmgp.com.ar"
          else
            echo "❌ Deploy fallido — revisá los logs en el servidor: /var/log/deploy-ayspmgp.log"
          fi
